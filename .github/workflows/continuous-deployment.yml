name: Continuous Deployment
on:
  workflow_dispatch
  push:
    branches:
    - main

env:
  BACKEND_REPOSITORY: workshop/production/backend
  FRONTEND_REPOSITORY: workshop/production/frontend
  IMAGE_TAG: ${{ github.sha }}
  
permissions:
  id-token: write
  contents: read

jobs:
  backend:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::917714909985:role/workshop-march-github-role

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -f backend/YoutubeLiveApp/Dockerfile \ 
          -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./backend/YoutubeLiveApp
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG



    - uses: actions/checkout@v6
        with:
          repository: 'diegoss3d/DevOpsAWS-gitops'
          token: ${{ secrets.PAT }}


    - run: |
          kustomize edit set image $REGISTRY/$REPOSITORY=$REGISTRY/$REPOSITORY:$IMAGE_TAG
          date > generated.txt
          # Note: the following account information will not work on GHES
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./kustomization.yml
          git commit -m "[BOT] Changing image to $REGISTRY/$REPOSITORY:$IMAGE_TAG"
          git push