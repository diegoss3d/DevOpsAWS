name: Continuous Deployment
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  BACKEND_REPOSITORY: workshop/production/backend
  FRONTEND_REPOSITORY: workshop/production/frontend
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: write 

jobs:
  backend:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-region: us-east-1
        role-to-assume: arn:aws:iam::917714909985:role/workshop-march-github-role

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ env.BACKEND_REPOSITORY }} 
      run: |
        docker build -f backend/YoutubeLiveApp/Dockerfile \
          -t $REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG ./backend/YoutubeLiveApp
        docker push $REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG

    - name: Checkout GitOps Repository
      uses: actions/checkout@v4
      with:
        repository: 'diegoss3d/DevOpsAWS-gitops'
        token: ${{ secrets.PAT }}

    - name: Update Kustomize and Push
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ env.BACKEND_REPOSITORY }}
      run: |
        # Configura as credenciais para o push usar o PAT injetado no checkout
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Altera o manifesto usando o Kustomize
        kustomize edit set image $REGISTRY/$BACKEND_REPOSITORY=$REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG
        date > generated.txt
        
        # Adiciona, commita e envia as alterações
        git add .
        git commit -m "[BOT] Changing image to $REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG [skip ci]"
        git push origin main